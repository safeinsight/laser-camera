<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Rear Camera Video Recorder</title>

<style>

body{

margin:0;

font-family:Arial,sans-serif;

background:#111;

color:white;

text-align:center;

}

h2{

margin-top:15px;

}

.container{

position:relative;

width:95%;

max-width:700px;

margin:20px auto;

}

video{

width:100%;

display:block;

border-radius:12px;

background:black;

}

canvas{

position:absolute;

top:0;

left:0;

width:100%;

height:100%;

pointer-events:none;

z-index:5;

}



/* TIMER */

#timerOverlay{

position:absolute;

top:15px;

left:50%;

transform:translateX(-50%);

background:rgba(0,0,0,.5);

padding:6px 14px;

border-radius:8px;

font-size:22px;

font-weight:bold;

z-index:20;

pointer-events:none;

}



/* SHOTS */

#shotsOverlay{

position:absolute;

bottom:15px;

left:15px;

background:rgba(0,0,0,.5);

padding:6px 12px;

border-radius:8px;

font-size:18px;

font-weight:bold;

z-index:20;

pointer-events:none;

}



/* DISTANCE */

#distanceOverlay{

position:absolute;

bottom:15px;

right:15px;

background:rgba(0,0,0,.5);

padding:6px 12px;

border-radius:8px;

font-size:18px;

font-weight:bold;

z-index:20;

pointer-events:auto;

cursor:pointer;

}



/* POPUP */

#distancePopup{

display:none;

position:absolute;

bottom:60px;

right:15px;

background:#222;

border-radius:12px;

overflow:hidden;

box-shadow:0 0 20px rgba(0,0,0,.7);

z-index:50;

}



.distanceOption{

padding:14px 25px;

font-size:20px;

cursor:pointer;

border-bottom:1px solid #444;

}



.distanceOption:last-child{

border-bottom:none;

}



.distanceOption:hover{

background:#333;

}



.selected{

background:#00a651;

}



/* COUNTDOWN */

#countdown{

font-size:72px;

font-weight:bold;

color:#ffcc00;

height:90px;

}



/* RECORD TIMER */

#recordTimer{

font-size:24px;

margin-top:10px;

}



/* BUTTONS */

button{

padding:16px 30px;

margin:12px;

font-size:22px;

font-weight:bold;

border:none;

border-radius:12px;

cursor:pointer;

min-width:220px;

}



#startBtn{

background:#00a651;

color:white;

}



#stopBtn{

background:#d62828;

color:white;

}

</style>

</head>

<body>

<h2>Rear Camera Video Recorder</h2>

<div id="countdown"></div>

<div class="container">

<video

id="preview"

autoplay

playsinline

muted>

</video>



<video

id="playback"

playsinline

style="display:none;">

</video>



<canvas id="overlay"></canvas>

<canvas

id="detectCanvas"

style="display:none;">

</canvas>

  

<div id="timerOverlay">

00:00

</div>



<div id="shotsOverlay">

Shots: 0

</div>



<div id="distanceOverlay">

Distance: 7y

</div>



<div id="distancePopup">

<div class="distanceOption">

3

</div>



<div class="distanceOption">

5

</div>



<div class="distanceOption selected">

7

</div>



<div class="distanceOption">

10

</div>



<div class="distanceOption">

15

</div>



<div class="distanceOption">

25

</div>

</div>

</div>



<div id="recordTimer">

00:00

</div>



<button id="startBtn">

Start Recording

</button>



<button id="stopBtn" disabled>

Stop Recording

</button>



<script>

const preview=document.getElementById("preview");

const playback=document.getElementById("playback");

const canvas=document.getElementById("overlay");

const ctx=canvas.getContext("2d");

const detectCanvas=

document.getElementById(

"detectCanvas"

);



const detectCtx=

detectCanvas.getContext(

"2d",

{

willReadFrequently:true

}

);



const timerOverlay=document.getElementById("timerOverlay");

const shotsOverlay=document.getElementById("shotsOverlay");

const distanceOverlay=document.getElementById("distanceOverlay");

const distancePopup=document.getElementById("distancePopup");

const distanceOptions=document.querySelectorAll(".distanceOption");

const countdown=document.getElementById("countdown");

const recordTimer=document.getElementById("recordTimer");

const startBtn=document.getElementById("startBtn");

const stopBtn=document.getElementById("stopBtn");



let stream;

let mediaRecorder;

let recordedChunks=[];

let recordingSeconds=0;

let timerInterval;

let shots=0;

let targetDistance=7;

let hits=[];

let laserVisible=false;

let lastShotTime=0;



/* CAMERA */

async function startCamera(){

try{

stream=await navigator.mediaDevices.getUserMedia({

video:{

facingMode:{ideal:"environment"},

width:{ideal:1280},

height:{ideal:720}

},

audio:true

});

preview.srcObject=stream;

}

catch(err){

alert("Unable to access camera");

console.log(err);

}

}

startCamera();



/* COUNTDOWN */

function beginCountdown(){

let count=3;

countdown.innerHTML=count;



const interval=setInterval(()=>{

count--;



if(count>0){

countdown.innerHTML=count;

}

else{

clearInterval(interval);

countdown.innerHTML="";

startRecording();

}

},1000);

}



/* START */

function startRecording(){

recordedChunks=[];

recordingSeconds=0;

shots=0;



updateDisplays();



mediaRecorder=new MediaRecorder(stream);



mediaRecorder.ondataavailable=(e)=>{

if(e.data.size>0){

recordedChunks.push(e.data);

}

};



mediaRecorder.onstop=showPlayback;



mediaRecorder.start();

hits=[];

laserVisible=false;

requestAnimationFrame(

detectLaser

);


timerInterval=setInterval(()=>{

recordingSeconds++;

updateDisplays();

},1000);



startBtn.disabled=true;

stopBtn.disabled=false;

}



/* STOP */

function stopRecording(){

mediaRecorder.stop();



clearInterval(timerInterval);



startBtn.disabled=false;

stopBtn.disabled=true;

}



/* UPDATE */

function updateDisplays(){

let mins=Math.floor(recordingSeconds/60)

.toString()

.padStart(2,"0");



let secs=(recordingSeconds%60)

.toString()

.padStart(2,"0");



const time=`${mins}:${secs}`;



timerOverlay.innerHTML=time;

recordTimer.innerHTML=time;



/* Placeholder shot count */

shots=Math.floor(recordingSeconds/2);



shotsOverlay.innerHTML=

`Shots: ${shots}`;



distanceOverlay.innerHTML=

`Distance: ${targetDistance}y`;

}



/* PLAYBACK */

function showPlayback(){

const blob=new Blob(

recordedChunks,

{

type:"video/webm"

}

);



const url=

URL.createObjectURL(blob);



preview.style.display="none";



playback.style.display="block";



playback.src=url;



playback.onloadedmetadata=()=>{

playback.play();

requestAnimationFrame(syncPlayback);

};

}



/* PLAYBACK TIMER */

function syncPlayback(){

if(

playback.paused ||

playback.ended

){

return;

}



let t=

Math.floor(

playback.currentTime

);



let mins=

Math.floor(t/60)

.toString()

.padStart(2,"0");



let secs=

(t%60)

.toString()

.padStart(2,"0");



timerOverlay.innerHTML=

`${mins}:${secs}`;



shotsOverlay.innerHTML=

`Shots: ${shots}`;



distanceOverlay.innerHTML=

`Distance: ${targetDistance}y`;



ctx.clearRect(

0,

0,

canvas.width,

canvas.height

);



ctx.strokeStyle="yellow";

ctx.lineWidth=3;



hits.forEach(hit=>{



ctx.beginPath();



ctx.arc(



(hit.x/

preview.videoWidth)

*

canvas.width,



(hit.y/

preview.videoHeight)

*

canvas.height,



12,



0,



Math.PI*2



);



ctx.stroke();



});

requestAnimationFrame(

syncPlayback

);

}

function detectLaser(){

console.log("Detecting...");
  
if(

!mediaRecorder ||

mediaRecorder.state!="recording"

){

return;

}



detectCanvas.width=

preview.videoWidth;



detectCanvas.height=

preview.videoHeight;



detectCtx.drawImage(

preview,

0,

0

);



const frame=

detectCtx.getImageData(

0,

0,

detectCanvas.width,

detectCanvas.height

);



const pixels=

frame.data;



let count=0;

let totalX=0;

let totalY=0;



for(

let y=75;

y<detectCanvas.height-75;

y++

){

for(

let x=75;

x<detectCanvas.width-75;

x++

){

const i=

(y*detectCanvas.width+x)*4;



const r=pixels[i];

const g=pixels[i+1];

const b=pixels[i+2];



if(

r>220 &&

g<90 &&

b<90 &&

r>(g*2) &&

r>(b*2)

){

count++;



totalX+=x;

totalY+=y;

}

}

}



if(

count>10 &&

count<300

){

const centerX=

totalX/count;



const centerY=

totalY/count;



const now=

Date.now();



if(

!laserVisible &&

(now-lastShotTime)>250

){

shots++;



hits.push({

x:centerX,

y:centerY,

time:recordingSeconds

});



lastShotTime=now;



laserVisible=true;



console.log(

"SHOT",

shots,

centerX,

centerY

);

}



}

else{

laserVisible=false;

}



requestAnimationFrame(

detectLaser

);

}

/* BUTTONS */

startBtn.onclick=()=>{

playback.pause();

playback.src="";



preview.style.display="block";

playback.style.display="none";



beginCountdown();

};



stopBtn.onclick=()=>{

stopRecording();

};



/* DISTANCE POPUP */

distanceOverlay.onclick=(e)=>{

e.stopPropagation();



if(

distancePopup.style.display=="block"

){

distancePopup.style.display=

"none";

}

else{

distancePopup.style.display=

"block";

}

};



distanceOptions.forEach(option=>{



option.onclick=(e)=>{



e.stopPropagation();



targetDistance=

parseInt(

option.innerText

);



distanceOverlay.innerHTML=

`Distance: ${targetDistance}y`;



distanceOptions.forEach(o=>{

o.classList.remove(

"selected"

);

});



option.classList.add(

"selected"

);



distancePopup.style.display=

"none";



};



});



document.onclick=()=>{

distancePopup.style.display=

"none";

};

</script>

</body>

</html>
