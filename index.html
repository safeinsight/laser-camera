<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Rear Camera Video Recorder</title>

<style>

body{
    font-family:Arial,sans-serif;
    text-align:center;
    background:#111;
    color:white;
}

.container{
    position:relative;
    width:95%;
    max-width:700px;
    margin:auto;
}

video{
    width:100%;
    border-radius:10px;
    background:black;
}

canvas{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

#timerOverlay{

position:absolute;

top:15px;

left:50%;

transform:translateX(-50%);

background:rgba(0,0,0,.5);

padding:6px 14px;

border-radius:8px;

font-size:22px;

font-weight:bold;

color:white;

z-index:10;

}

#shotsOverlay{

position:absolute;

bottom:15px;

left:15px;

background:rgba(0,0,0,.5);

padding:6px 12px;

border-radius:8px;

font-size:18px;

font-weight:bold;

color:white;

z-index:10;

}

#scoreOverlay{

position:absolute;

bottom:15px;

right:15px;

background:rgba(0,0,0,.5);

padding:6px 12px;

border-radius:8px;

font-size:18px;

font-weight:bold;

color:white;

z-index:10;

}


    
button{
    padding:12px 22px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#startBtn{
    background:#00a651;
    color:white;
}

#stopBtn{
    background:#d62828;
    color:white;
}

#countdown{
    font-size:72px;
    font-weight:bold;
    color:#ffcc00;
}

#recordTimer{
    font-size:24px;
    margin-top:10px;
}

</style>
</head>

<body>

<h2>Rear Camera Video Recorder</h2>

<div id="countdown"></div>

<div class="container">

    <video id="preview" autoplay playsinline muted></video>

    <video id="playback" playsinline style="display:none;"></video>

    <canvas id="overlay"></canvas>


    <div id="timerOverlay">

        00:00

    </div>


    <div id="shotsOverlay">

        Shots: 0

    </div>


    <div id="scoreOverlay">

        Score: 0

    </div>

</div>

<div id="recordTimer">00:00</div>

<button id="startBtn">Start Recording</button>
<button id="stopBtn" disabled>Stop Recording</button>

<script>

const preview=document.getElementById("preview");
const playback=document.getElementById("playback");

const canvas=document.getElementById("overlay");
const ctx=canvas.getContext("2d");

const countdown=document.getElementById("countdown");

const recordTimer=document.getElementById("recordTimer");

const startBtn=document.getElementById("startBtn");
const stopBtn=document.getElementById("stopBtn");

const timerOverlay=document.getElementById("timerOverlay");

const shotsOverlay=document.getElementById("shotsOverlay");

const scoreOverlay=document.getElementById("scoreOverlay");

let stream;
let mediaRecorder;
let recordedChunks=[];

let recordInterval;
let recordingSeconds=0;

let playbackStart;

let shots=0;
let score=0;


//--------------------------
// OPEN REAR CAMERA
//--------------------------

async function startCamera(){

try{

stream=await navigator.mediaDevices.getUserMedia({

video:{
facingMode:{ideal:"environment"},
width:{ideal:1280},
height:{ideal:720}
},

audio:true

});

preview.srcObject=stream;

}catch(e){

alert("Unable to access camera");

console.log(e);

}

}

startCamera();


//--------------------------
// COUNTDOWN
//--------------------------

async function beginCountdown(){

let count=3;

countdown.innerHTML=count;

const interval=setInterval(()=>{

count--;

if(count>0){

countdown.innerHTML=count;

}else{

clearInterval(interval);

countdown.innerHTML="";

startRecording();

}

},1000);

}


//--------------------------
// START RECORDING
//--------------------------

function startRecording(){

recordedChunks=[];

mediaRecorder=new MediaRecorder(stream,{

mimeType:"video/webm"

});

mediaRecorder.ondataavailable=e=>{

if(e.data.size>0){

recordedChunks.push(e.data);

}

};

mediaRecorder.onstop=showPlayback;

mediaRecorder.start();

recordingSeconds=0;

updateRecordTimer();

recordInterval=setInterval(()=>{

recordingSeconds++;

updateRecordTimer();

},1000);

startBtn.disabled=true;

stopBtn.disabled=false;

}


//--------------------------
// STOP RECORDING
//--------------------------

function stopRecording(){

mediaRecorder.stop();

clearInterval(recordInterval);

startBtn.disabled=false;

stopBtn.disabled=true;

}


//--------------------------
// TIMER DISPLAY
//--------------------------

function updateRecordTimer(){

let mins=Math.floor(recordingSeconds/60)
.toString()
.padStart(2,"0");

let secs=(recordingSeconds%60)
.toString()
.padStart(2,"0");

recordTimer.innerHTML=`${mins}:${secs}`;

}


//--------------------------
// PLAYBACK
//--------------------------

function showPlayback(){

const blob=new Blob(recordedChunks,{

type:"video/webm"

});

const url=URL.createObjectURL(blob);

preview.style.display="none";

playback.style.display="block";

playback.src=url;

playback.play();

playbackStart=Date.now();

resizeCanvas();

requestAnimationFrame(drawOverlay);

}


//--------------------------
// CANVAS SIZE
//--------------------------

function resizeCanvas(){

canvas.width=playback.clientWidth;

canvas.height=playback.clientHeight;

}

window.addEventListener("resize",resizeCanvas);


}

//--------------------------
// DRAW OVERLAY
//--------------------------

function drawOverlay(){

    if(playback.paused || playback.ended){
        return;
    }

    let elapsed=Math.floor((Date.now()-playbackStart)/1000);

    let mins=Math.floor(elapsed/60)
        .toString()
        .padStart(2,"0");

    let secs=(elapsed%60)
        .toString()
        .padStart(2,"0");
 
timerOverlay.innerHTML=`${mins}:${secs}`;


shotsOverlay.innerHTML=`Shots: ${shots}`;


scoreOverlay.innerHTML=`Score: ${score}`;


requestAnimationFrame(drawOverlay);

}


//--------------------------
// BUTTONS
//--------------------------

startBtn.onclick=()=>{

preview.style.display="block";

playback.style.display="none";

beginCountdown();

};

stopBtn.onclick=()=>{

stopRecording();

};

</script>

</body>
</html>
