<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta

name="viewport"

content="width=device-width, initial-scale=1.0">

<title>

Laser Target Trainer

</title>



<style>



body{

margin:0;

background:#111;

font-family:Arial,sans-serif;

text-align:center;

color:white;

}



h2{

margin-top:15px;

}



.container{

position:relative;

width:95%;

max-width:700px;

margin:auto;

}



video{

width:100%;

display:block;

background:black;

border-radius:12px;

}



#overlay{

position:absolute;

top:0;

left:0;

width:100%;

height:100%;

pointer-events:none;

z-index:5;

}



#detectCanvas{

display:none;

}



#timerOverlay{

position:absolute;

top:15px;

left:50%;

transform:

translateX(-50%);



background:

rgba(0,0,0,.55);



padding:

6px 16px;



border-radius:

10px;



font-size:

22px;



font-weight:

bold;



z-index:20;

}



#shotsOverlay{

position:absolute;

bottom:15px;

left:15px;

background:

rgba(0,0,0,.55);

padding:

6px 12px;

border-radius:

10px;

font-size:

18px;

font-weight:

bold;

z-index:20;

}



#distanceOverlay{

position:absolute;

bottom:15px;

right:15px;

background:

rgba(0,0,0,.55);

padding:

6px 12px;

border-radius:

10px;

font-size:

18px;

font-weight:

bold;

z-index:20;

cursor:pointer;

}



#distancePopup{

display:none;

position:absolute;

bottom:60px;

right:15px;

background:#222;

border-radius:12px;

overflow:hidden;

box-shadow:

0 0 20px

rgba(0,0,0,.7);

z-index:50;

}



.distanceOption{

padding:

14px 25px;

font-size:20px;

cursor:pointer;

border-bottom:

1px solid #444;

}



.distanceOption:hover{

background:#333;

}



.selected{

background:#00a651;

}



#greenBox{

position:absolute;

border:

3px solid lime;

display:none;

pointer-events:none;

z-index:10;

}



button{

padding:

16px 30px;

margin:

10px;

font-size:

20px;

font-weight:

bold;

border:none;

border-radius:

12px;

cursor:pointer;

min-width:

220px;

}



#calibrateBtn{

background:#0066cc;

color:white;

}



#startBtn{

background:#00a651;

color:white;

}



#stopBtn{

background:#d62828;

color:white;

}



#countdown{

height:90px;

font-size:72px;

font-weight:bold;

color:#ffcc00;

}



</style>

</head>

<body>



<h2>

Laser Target Trainer

</h2>



<div id="countdown">

</div>



<button

id="calibrateBtn">

Calibrate Target

</button>



<div class="container">

<video

id="preview"

autoplay

playsinline

muted>

</video>



<video

id="playback"

playsinline

style="display:none;">

</video>



<canvas

id="overlay">

</canvas>



<canvas

id="detectCanvas">

</canvas>



<div

id="greenBox">

</div>



<div

id="timerOverlay">

00:00

</div>



<div

id="shotsOverlay">

Shots: 0

</div>



<div

id="distanceOverlay">

Distance: 7y

</div>



<div

id="distancePopup">



<div

class="distanceOption">

3

</div>



<div

class="distanceOption">

5

</div>



<div

class="distanceOption selected">

7

</div>



<div

class="distanceOption">

10

</div>



<div

class="distanceOption">

15

</div>



<div

class="distanceOption">

25

</div>



</div>

</div>



<button

id="startBtn">

Start Recording

</button>



<button

id="stopBtn"

disabled>

Stop Recording

</button>



<script>



const preview=

document.getElementById(

"preview"

);



const playback=

document.getElementById(

"playback"

);



const overlay=

document.getElementById(

"overlay"

);



const ctx=

overlay.getContext(

"2d"

);



const detectCanvas=

document.getElementById(

"detectCanvas"

);



const detectCtx=

detectCanvas.getContext(

"2d",

{

willReadFrequently:true

}

);



const greenBox=

document.getElementById(

"greenBox"

);



const timerOverlay=

document.getElementById(

"timerOverlay"

);



const shotsOverlay=

document.getElementById(

"shotsOverlay"

);



const distanceOverlay=

document.getElementById(

"distanceOverlay"

);



const distancePopup=

document.getElementById(

"distancePopup"

);



const distanceOptions=

document.querySelectorAll(

".distanceOption"

);



const calibrateBtn=

document.getElementById(

"calibrateBtn"

);



const startBtn=

document.getElementById(

"startBtn"

);



const stopBtn=

document.getElementById(

"stopBtn"

);



const countdown=

document.getElementById(

"countdown"

);

//--------------------------
// VARIABLES
//--------------------------

let stream;

let mediaRecorder;

let recordedChunks=[];



let recordingSeconds=0;

let timerInterval;



let targetDistance=7;



let shots=0;



let hits=[];



let laserVisible=false;



let lastShotTime=0;



let target={

left:0,

right:0,

top:0,

bottom:0,

calibrated:false

};

let calibrationStep=0;





//--------------------------
// CAMERA
//--------------------------

async function startCamera(){



try{



stream=

await navigator.mediaDevices

.getUserMedia({



video:{



facingMode:{

ideal:"environment"

},



width:{

ideal:1280

},



height:{

ideal:720

}



},



audio:true



});



preview.srcObject=

stream;



preview.onloadedmetadata=()=>{



resizeEverything();



};





}catch(err){



alert(

"Unable to access camera"

);



console.log(err);



}



}



startCamera();

preview.addEventListener(

"click",

handleCalibrationTap

);


//--------------------------
// RESIZE
//--------------------------

function resizeEverything(){

const video=

preview.style.display!="none"

?

preview

:

playback;



if(

!video.videoWidth ||

!video.videoHeight

){

return;

}



const rect=

video.getBoundingClientRect();



overlay.width=

video.videoWidth;



overlay.height=

video.videoHeight;



overlay.style.width=

rect.width+"px";



overlay.style.height=

rect.height+"px";


detectCanvas.width=

video.videoWidth;

detectCanvas.height=

video.videoHeight;

    

console.log(

"Overlay:",

overlay.width,

overlay.height

);
    
}



window.addEventListener(

"resize",

resizeEverything

);




//--------------------------
// COUNTDOWN
//--------------------------

function beginCountdown(){

    console.log("COUNTDOWN STARTED");

    let count=3;

    countdown.innerHTML=count;

    const interval=setInterval(()=>{

        console.log("COUNT:", count);

        count--;

        if(count>0){

            countdown.innerHTML=count;

        } else {

            clearInterval(interval);

            console.log("CALLING startRecording");

            countdown.innerHTML="";

            startRecording();

        }

    },1000);
}



//--------------------------
// START RECORDING
//--------------------------

function startRecording(){



recordedChunks=[];



hits=[];



shots=0;



recordingSeconds=0;





updateDisplays();





mediaRecorder=



new MediaRecorder(

stream

);





mediaRecorder

.ondataavailable=(e)=>{



if(

e.data.size>0

){



recordedChunks.push(

e.data

);



}



};





mediaRecorder

.onstop=



showPlayback;





mediaRecorder.start();

console.log("BEFORE requestAnimationFrame");

requestAnimationFrame(
    detectLaser
);

console.log("AFTER requestAnimationFrame");



timerInterval=



setInterval(()=>{


recordingSeconds++;


updateDisplays();



},1000);


    
startBtn.disabled=true;



stopBtn.disabled=false;



}




//--------------------------
// STOP RECORDING
//--------------------------

function stopRecording(){



mediaRecorder.stop();





clearInterval(

timerInterval

);





startBtn.disabled=false;



stopBtn.disabled=true;



}




//--------------------------
// PLAYBACK
//--------------------------

function showPlayback(){



const blob=



new Blob(



recordedChunks,



{

type:"video/webm"

}



);





const url=



URL.createObjectURL(

blob

);





preview.style.display=



"none";





playback.style.display=



"block";





playback.src=url;





playback.onloadedmetadata=()=>{



resizeEverything();





playback.play();





requestAnimationFrame(

syncPlayback

);



};



}


//--------------------------
// UPDATE DISPLAYS
//--------------------------

function updateDisplays(){

let mins=

Math.floor(

recordingSeconds/60

)

.toString()

.padStart(2,"0");



let secs=

(recordingSeconds%60)

.toString()

.padStart(2,"0");



let time=

`${mins}:${secs}`;



timerOverlay.innerHTML=

time;



shotsOverlay.innerHTML=

`Shots: ${shots}`;



distanceOverlay.innerHTML=

`Distance: ${targetDistance}y`;

}



//--------------------------
// CALIBRATE TARGET
//--------------------------

function calibrateTarget(){

alert(

"Tap the TOP LEFT corner of your target"

);

calibrationStep=1;

}

function handleCalibrationTap(e){

if(

calibrationStep===0

){

return;

}



const rect=

preview.getBoundingClientRect();



const scaleX=

preview.videoWidth/

rect.width;



const scaleY=

preview.videoHeight/

rect.height;



const x=

(

e.clientX

-

rect.left

)

*

scaleX;



const y=

(

e.clientY

-

rect.top

)

*

scaleY;



// FIRST TAP

if(

calibrationStep===1

){

target.left=x;

target.top=y;



calibrationStep=2;



alert(

"Now tap the BOTTOM RIGHT corner"

);



return;

}



// SECOND TAP

if(

calibrationStep===2

){

target.right=x;

target.bottom=y;



target.calibrated=true;

console.log(

"Preview:",

preview.videoWidth,

preview.videoHeight

);

console.log(

"Detect:",

detectCanvas.width,

detectCanvas.height

);

console.log(target);


console.log(
    "Target Size:",
    target.right - target.left,
    target.bottom - target.top
);



    
calibrationStep=0;



drawGreenBox();

resizeEverything();

drawHits();

alert(

"Target Calibrated"

);



console.log(target);

}

}


//--------------------------
// DRAW GREEN BOX
//--------------------------

function drawGreenBox(){

    if(!target.calibrated){

        return;

    }

    const scaleX =
        preview.clientWidth /
        preview.videoWidth;

    const scaleY =
        preview.clientHeight /
        preview.videoHeight;


    greenBox.style.display = "block";


    greenBox.style.left =

        (target.left * scaleX)

        + "px";


    greenBox.style.top =

        (target.top * scaleY)

        + "px";


greenBox.style.width =

Math.abs(

target.right -

target.left

)

* scaleX

+ "px";


greenBox.style.height =

Math.abs(

target.bottom -

target.top

)

* scaleY

+ "px";

}


//--------------------------
// DISTANCE POPUP
//--------------------------

distanceOverlay.onclick=(e)=>{



e.stopPropagation();



if(

distancePopup.style.display

=="block"

){

distancePopup.style.display=

"none";

}



else{



distancePopup.style.display=

"block";



}



};



distanceOptions.forEach(option=>{



option.onclick=(e)=>{



e.stopPropagation();



targetDistance=

parseInt(

option.innerText

);



distanceOptions

.forEach(o=>{



o.classList.remove(

"selected"

);



});



option.classList.add(

"selected"

);



distanceOverlay.innerHTML=

`Distance: ${targetDistance}y`;



distancePopup.style.display=

"none";



};



});



document.onclick=()=>{



distancePopup.style.display=

"none";



};


//------------------------------------------------
// LASER DETECTION V3
//------------------------------------------------

function detectLaser(){

    if(
        !mediaRecorder ||
        mediaRecorder.state !== "recording"
    ){
        return;
    }

    if(!target.calibrated){
        requestAnimationFrame(detectLaser);
        return;
    }

    detectCtx.drawImage(
        preview,
        0,
        0,
        detectCanvas.width,
        detectCanvas.height
    );

    const frame = detectCtx.getImageData(
        0,
        0,
        detectCanvas.width,
        detectCanvas.height
    );

    const pixels = frame.data;

    const left   = Math.max(0,Math.floor(Math.min(target.left,target.right)));
    const right  = Math.min(detectCanvas.width,Math.floor(Math.max(target.left,target.right)));
    const top    = Math.max(0,Math.floor(Math.min(target.top,target.bottom)));
    const bottom = Math.min(detectCanvas.height,Math.floor(Math.max(target.top,target.bottom)));

    let totalX = 0;
    let totalY = 0;
    let totalWeight = 0;
    let brightPixels = 0;

    for(let y=top;y<bottom;y+=2){

        for(let x=left;x<right;x+=2){

            const i=((y*detectCanvas.width)+x)*4;

            const r=pixels[i];
            const g=pixels[i+1];
            const b=pixels[i+2];

            const brightness=(r+g+b)/3;

            const laser =

                (
                    r>150 &&
                    r>g*1.15 &&
                    r>b*1.15
                )

                ||

                (
                    brightness>235
                );

            if(!laser) continue;

            brightPixels++;

            const weight=Math.max(r,brightness);

            totalWeight+=weight;
            totalX+=x*weight;
            totalY+=y*weight;

        }

    }

    if(brightPixels<4){

        requestAnimationFrame(detectLaser);
        return;

    }

    const hitX=Math.round(totalX/totalWeight);
    const hitY=Math.round(totalY/totalWeight);

    const overlayX=
        hitX/detectCanvas.width*overlay.width;

    const overlayY=
        hitY/detectCanvas.height*overlay.height;

    drawHits();

    ctx.beginPath();
    ctx.arc(
        overlayX,
        overlayY,
        8,
        0,
        Math.PI*2
    );

    ctx.lineWidth=3;
    ctx.strokeStyle="red";
    ctx.stroke();

    const now=performance.now();

    if(now-lastShotTime>250){

        lastShotTime=now;

        shots++;

        hits.push({

            x:hitX,
            y:hitY,
            time:recordingSeconds

        });

        updateDisplays();

        console.log(
            "SHOT",
            shots,
            hitX,
            hitY
        );

    }

    requestAnimationFrame(
        detectLaser
    );

}




//--------------------------
// DRAW HITS
//--------------------------

function drawHits(){



ctx.clearRect(

0,

0,

overlay.width,

overlay.height

);



ctx.strokeStyle=

"yellow";



ctx.lineWidth=4;



hits.forEach(hit=>{



const x=

(hit.x/

preview.videoWidth)

*

ctx.canvas.width;



const y=

(hit.y/

preview.videoHeight)

*

ctx.canvas.height;



ctx.beginPath();



ctx.arc(



x,



y,



16,



0,



Math.PI*2



);



ctx.stroke();



});



}

calibrateBtn.onclick=()=>{

calibrateTarget();

};



function syncPlayback(){

if(

playback.paused ||

playback.ended

){

return;

}



ctx.clearRect(

0,

0,

overlay.width,

overlay.height

);



ctx.strokeStyle="yellow";

ctx.lineWidth=4;



hits.forEach(hit=>{



if(

hit.time<=

playback.currentTime

){



const x=

(hit.x/

preview.videoWidth)

*

overlay.width;



const y=

(hit.y/

preview.videoHeight)

*

overlay.height;



ctx.beginPath();



ctx.arc(

x,

y,

16,

0,

Math.PI*2

);



ctx.stroke();



}



});



let t=

Math.floor(

playback.currentTime

);



let mins=

Math.floor(

t/60

)

.toString()

.padStart(

2,

"0"

);



let secs=

(t%60)

.toString()

.padStart(

2,

"0"

);



timerOverlay.innerHTML=

`${mins}:${secs}`;



shotsOverlay.innerHTML=

`Shots: ${hits.length}`;



requestAnimationFrame(

syncPlayback

);

}



startBtn.onclick=()=>{

console.log("START BUTTON CLICKED");

playback.pause();

playback.src="";

preview.style.display="block";

playback.style.display="none";

beginCountdown();

};



stopBtn.onclick=()=>{

stopRecording();

};

</script>

</body>

</html>
