<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta

name="viewport"

content="width=device-width, initial-scale=1.0">

<title>

Laser Target Trainer

</title>



<style>



body{

margin:0;

background:#111;

font-family:Arial,sans-serif;

text-align:center;

color:white;

}



h2{

margin-top:15px;

}



.container{

position:relative;

width:95%;

max-width:700px;

margin:auto;

}



video{

width:100%;

display:block;

background:black;

border-radius:12px;

}



#overlay{

position:absolute;

top:0;

left:0;

width:100%;

height:100%;

pointer-events:none;

z-index:5;

}



#detectCanvas{

display:none;

}



#timerOverlay{

position:absolute;

top:15px;

left:50%;

transform:

translateX(-50%);



background:

rgba(0,0,0,.55);



padding:

6px 16px;



border-radius:

10px;



font-size:

22px;



font-weight:

bold;



z-index:20;

}



#shotsOverlay{

position:absolute;

bottom:15px;

left:15px;

background:

rgba(0,0,0,.55);

padding:

6px 12px;

border-radius:

10px;

font-size:

18px;

font-weight:

bold;

z-index:20;

}



#distanceOverlay{

position:absolute;

bottom:15px;

right:15px;

background:

rgba(0,0,0,.55);

padding:

6px 12px;

border-radius:

10px;

font-size:

18px;

font-weight:

bold;

z-index:20;

cursor:pointer;

}



#distancePopup{

display:none;

position:absolute;

bottom:60px;

right:15px;

background:#222;

border-radius:12px;

overflow:hidden;

box-shadow:

0 0 20px

rgba(0,0,0,.7);

z-index:50;

}



.distanceOption{

padding:

14px 25px;

font-size:20px;

cursor:pointer;

border-bottom:

1px solid #444;

}



.distanceOption:hover{

background:#333;

}



.selected{

background:#00a651;

}



#greenBox{

position:absolute;

border:

3px solid lime;

display:none;

pointer-events:none;

z-index:10;

}



button{

padding:

16px 30px;

margin:

10px;

font-size:

20px;

font-weight:

bold;

border:none;

border-radius:

12px;

cursor:pointer;

min-width:

220px;

}



#calibrateBtn{

background:#0066cc;

color:white;

}



#startBtn{

background:#00a651;

color:white;

}



#stopBtn{

background:#d62828;

color:white;

}



#countdown{

height:90px;

font-size:72px;

font-weight:bold;

color:#ffcc00;

}



</style>

</head>

<body>



<h2>

Laser Target Trainer

</h2>



<div id="countdown">

</div>



<button

id="calibrateBtn">

Calibrate Target

</button>



<div class="container">

<video

id="preview"

autoplay

playsinline

muted>

</video>



<video

id="playback"

playsinline

style="display:none;">

</video>



<canvas

id="overlay">

</canvas>



<canvas

id="detectCanvas">

</canvas>



<div

id="greenBox">

</div>



<div

id="timerOverlay">

00:00

</div>



<div

id="shotsOverlay">

Shots: 0

</div>



<div

id="distanceOverlay">

Distance: 7y

</div>



<div

id="distancePopup">



<div

class="distanceOption">

3

</div>



<div

class="distanceOption">

5

</div>



<div

class="distanceOption selected">

7

</div>



<div

class="distanceOption">

10

</div>



<div

class="distanceOption">

15

</div>



<div

class="distanceOption">

25

</div>



</div>

</div>



<button

id="startBtn">

Start Recording

</button>



<button

id="stopBtn"

disabled>

Stop Recording

</button>



<script>



const preview=

document.getElementById(

"preview"

);



const playback=

document.getElementById(

"playback"

);



const overlay=

document.getElementById(

"overlay"

);



const ctx=

overlay.getContext(

"2d"

);



const detectCanvas=

document.getElementById(

"detectCanvas"

);



const detectCtx=

detectCanvas.getContext(

"2d",

{

willReadFrequently:true

}

);



const greenBox=

document.getElementById(

"greenBox"

);



const timerOverlay=

document.getElementById(

"timerOverlay"

);



const shotsOverlay=

document.getElementById(

"shotsOverlay"

);



const distanceOverlay=

document.getElementById(

"distanceOverlay"

);



const distancePopup=

document.getElementById(

"distancePopup"

);



const distanceOptions=

document.querySelectorAll(

".distanceOption"

);



const calibrateBtn=

document.getElementById(

"calibrateBtn"

);



const startBtn=

document.getElementById(

"startBtn"

);



const stopBtn=

document.getElementById(

"stopBtn"

);



const countdown=

document.getElementById(

"countdown"

);

//--------------------------
// VARIABLES
//--------------------------

let stream;

let mediaRecorder;

let recordedChunks=[];



let recordingSeconds=0;

let timerInterval;



let targetDistance=7;



let shots=0;



let hits=[];



let laserVisible=false;



let lastShotTime=0;



let target={

left:0,

right:0,

top:0,

bottom:0,

calibrated:false

};

let calibrationStep=0;





//--------------------------
// CAMERA
//--------------------------

async function startCamera(){



try{



stream=

await navigator.mediaDevices

.getUserMedia({



video:{



facingMode:{

ideal:"environment"

},



width:{

ideal:1920

},



height:{

ideal:1080

}



},



audio:true



});



preview.srcObject=

stream;



preview.onloadedmetadata=()=>{



resizeEverything();



};





}catch(err){



alert(

"Unable to access camera"

);



console.log(err);



}



}



startCamera();

preview.addEventListener(

"click",

handleCalibrationTap

);


//--------------------------
// RESIZE
//--------------------------

function resizeEverything(){

const video=

preview.style.display!="none"

?

preview

:

playback;



if(

!video.videoWidth ||

!video.videoHeight

){

return;

}



const rect=

video.getBoundingClientRect();



overlay.width=

video.videoWidth;



overlay.height=

video.videoHeight;



overlay.style.width=

rect.width+"px";



overlay.style.height=

rect.height+"px";


detectCanvas.width=

video.videoWidth;

detectCanvas.height=

video.videoHeight;

    

console.log(

"Overlay:",

overlay.width,

overlay.height

);
    
}



window.addEventListener(

"resize",

resizeEverything

);




//--------------------------
// COUNTDOWN
//--------------------------

function beginCountdown(){

    console.log("COUNTDOWN STARTED");

    let count=3;

    countdown.innerHTML=count;

    const interval=setInterval(()=>{

        console.log("COUNT:", count);

        count--;

        if(count>0){

            countdown.innerHTML=count;

        } else {

            clearInterval(interval);

            console.log("CALLING startRecording");

            countdown.innerHTML="";

            startRecording();

        }

    },1000);
}



//--------------------------
// START RECORDING
//--------------------------

function startRecording(){



recordedChunks=[];



hits=[];



shots=0;



recordingSeconds=0;





updateDisplays();





mediaRecorder=



new MediaRecorder(

stream

);





mediaRecorder

.ondataavailable=(e)=>{



if(

e.data.size>0

){



recordedChunks.push(

e.data

);



}



};





mediaRecorder

.onstop=



showPlayback;





mediaRecorder.start();

console.log("BEFORE requestAnimationFrame");

requestAnimationFrame(
    detectLaser
);

console.log("AFTER requestAnimationFrame");



timerInterval=



setInterval(()=>{


recordingSeconds++;


updateDisplays();



},1000);


    
startBtn.disabled=true;



stopBtn.disabled=false;



}




//--------------------------
// STOP RECORDING
//--------------------------

function stopRecording(){



mediaRecorder.stop();





clearInterval(

timerInterval

);





startBtn.disabled=false;



stopBtn.disabled=true;



}




//--------------------------
// PLAYBACK
//--------------------------

function showPlayback(){



const blob=



new Blob(



recordedChunks,



{

type:"video/webm"

}



);





const url=



URL.createObjectURL(

blob

);





preview.style.display=



"none";





playback.style.display=



"block";





playback.src=url;





playback.onloadedmetadata=()=>{



resizeEverything();





playback.play();





requestAnimationFrame(

syncPlayback

);



};



}


//--------------------------
// UPDATE DISPLAYS
//--------------------------

function updateDisplays(){

let mins=

Math.floor(

recordingSeconds/60

)

.toString()

.padStart(2,"0");



let secs=

(recordingSeconds%60)

.toString()

.padStart(2,"0");



let time=

`${mins}:${secs}`;



timerOverlay.innerHTML=

time;



shotsOverlay.innerHTML=

`Shots: ${shots}`;



distanceOverlay.innerHTML=

`Distance: ${targetDistance}y`;

}



//--------------------------
// CALIBRATE TARGET
//--------------------------

function calibrateTarget(){

alert(

"Tap the TOP LEFT corner of your target"

);

calibrationStep=1;

}

function handleCalibrationTap(e){

if(

calibrationStep===0

){

return;

}



const rect=

preview.getBoundingClientRect();



const scaleX=

preview.videoWidth/

rect.width;



const scaleY=

preview.videoHeight/

rect.height;



const x=

(

e.clientX

-

rect.left

)

*

scaleX;



const y=

(

e.clientY

-

rect.top

)

*

scaleY;



// FIRST TAP

if(

calibrationStep===1

){

target.left=x;

target.top=y;



calibrationStep=2;



alert(

"Now tap the BOTTOM RIGHT corner"

);



return;

}



// SECOND TAP

if(

calibrationStep===2

){

target.right=x;

target.bottom=y;



target.calibrated=true;

console.log(

"Preview:",

preview.videoWidth,

preview.videoHeight

);

console.log(

"Detect:",

detectCanvas.width,

detectCanvas.height

);

console.log(target);


console.log(
    "Target Size:",
    target.right - target.left,
    target.bottom - target.top
);



    
calibrationStep=0;



drawGreenBox();

resizeEverything();

drawHits();

alert(

"Target Calibrated"

);



console.log(target);

}

}


//--------------------------
// DRAW GREEN BOX
//--------------------------

function drawGreenBox(){

    if(!target.calibrated){

        return;

    }

    const scaleX =
        preview.clientWidth /
        preview.videoWidth;

    const scaleY =
        preview.clientHeight /
        preview.videoHeight;


    greenBox.style.display = "block";


    greenBox.style.left =

        (target.left * scaleX)

        + "px";


    greenBox.style.top =

        (target.top * scaleY)

        + "px";


greenBox.style.width =

Math.abs(

target.right -

target.left

)

* scaleX

+ "px";


greenBox.style.height =

Math.abs(

target.bottom -

target.top

)

* scaleY

+ "px";

}


//--------------------------
// DISTANCE POPUP
//--------------------------

distanceOverlay.onclick=(e)=>{



e.stopPropagation();



if(

distancePopup.style.display

=="block"

){

distancePopup.style.display=

"none";

}



else{



distancePopup.style.display=

"block";



}



};



distanceOptions.forEach(option=>{



option.onclick=(e)=>{



e.stopPropagation();



targetDistance=

parseInt(

option.innerText

);



distanceOptions

.forEach(o=>{



o.classList.remove(

"selected"

);



});



option.classList.add(

"selected"

);



distanceOverlay.innerHTML=

`Distance: ${targetDistance}y`;



distancePopup.style.display=

"none";



};



});



document.onclick=()=>{



distancePopup.style.display=

"none";



};


//--------------------------
// LASER DETECTION
//--------------------------

function detectLaser(){

console.log("detectLaser running");

if(

!mediaRecorder ||

mediaRecorder.state!="recording"

){

return;

}



if(

!target.calibrated

){

requestAnimationFrame(

detectLaser

);

return;

}



detectCtx.drawImage(

preview,

0,

0,

detectCanvas.width,

detectCanvas.height

);

const testPixel =
    detectCtx.getImageData(
        100,
        100,
        1,
        1
    ).data;

console.log(
    "Pixel:",
    testPixel[0],
    testPixel[1],
    testPixel[2]
);

const frame=

detectCtx.getImageData(

0,

0,

detectCanvas.width,

detectCanvas.height

);



const pixels=

frame.data;



let totalX=0;

let totalY=0;

let count=0;


ctx.clearRect(

0,

0,

overlay.width,

overlay.height

);


const left = 0;
const top = 0;
const right = detectCanvas.width;
const bottom = detectCanvas.height;


for(

let y=top;

y<bottom;

y++

){

for(

let x=left;

x<right;

x++

){

if(

x===Math.floor(

(left+right)/2

)

&&

y===Math.floor(

(top+bottom)/2

)

){

console.log(

"Scanning center",

x,

y

);

}
    
const i=

(

y*

detectCanvas.width

+x

)*4;


const r=

pixels[i];


const g=

pixels[i+1];


const b=

pixels[i+2];

if (
    r > 180 ||
    g > 180 ||
    b > 180
){
    console.log(
        "Bright Pixel:",
        r,
        g,
        b
    );
}

if (
    x === Math.floor((left + right)/2) &&
    y === Math.floor((top + bottom)/2)
){
    console.log(
        "Center RGB:",
        r,
        g,
        b
    );
}
    
if(

r>200 ||

g>200 ||

b>200

){

console.log(

"Bright:",

r,

g,

b

);

}

    

const brightness = (r + g + b) / 3;

const isRed =
    r > 140 &&
    r > g * 1.25 &&
    r > b * 1.25;

const isWhite =
    brightness > 180;


if(

isRed ||

isWhite

)

{

count++;

totalX += x;

totalY += y;


const drawX =

(x / detectCanvas.width)

*

overlay.width;


const drawY =

(y / detectCanvas.height)

*

overlay.height;


ctx.fillStyle="red";

ctx.fillRect(

drawX,

drawY,

4,

4

);

}

}

}

    if(count>0){
    console.log(
        "FOUND PIXELS:",
        count
    );
}

console.log(

"Laser Pixels:",

count

);
    

// Require a minimum blob size

if(

count>3

&&

count<5000

)

{

const centerX=

Math.floor(

totalX/count

);



const centerY=

Math.floor(

totalY/count

);



const now=

Date.now();



// debounce

if(

now-lastShotTime

>350

){



shots++;



lastShotTime=

now;


hits.push({

x:centerX,

y:centerY,

time:recordingSeconds

});

drawHits();

updateDisplays();

console.log(

"SHOT",

shots,

centerX,

centerY

);

}

}

requestAnimationFrame(

detectLaser

);

}




//--------------------------
// DRAW HITS
//--------------------------

function drawHits(){



ctx.clearRect(

0,

0,

overlay.width,

overlay.height

);



ctx.strokeStyle=

"yellow";



ctx.lineWidth=4;



hits.forEach(hit=>{



const x=

(hit.x/

preview.videoWidth)

*

ctx.canvas.width;



const y=

(hit.y/

preview.videoHeight)

*

ctx.canvas.height;



ctx.beginPath();



ctx.arc(



x,



y,



16,



0,



Math.PI*2



);



ctx.stroke();



});



}

calibrateBtn.onclick=()=>{

calibrateTarget();

};



function syncPlayback(){

if(

playback.paused ||

playback.ended

){

return;

}



ctx.clearRect(

0,

0,

overlay.width,

overlay.height

);



ctx.strokeStyle="yellow";

ctx.lineWidth=4;



hits.forEach(hit=>{



if(

hit.time<=

playback.currentTime

){



const x=

(hit.x/

preview.videoWidth)

*

overlay.width;



const y=

(hit.y/

preview.videoHeight)

*

overlay.height;



ctx.beginPath();



ctx.arc(

x,

y,

16,

0,

Math.PI*2

);



ctx.stroke();



}



});



let t=

Math.floor(

playback.currentTime

);



let mins=

Math.floor(

t/60

)

.toString()

.padStart(

2,

"0"

);



let secs=

(t%60)

.toString()

.padStart(

2,

"0"

);



timerOverlay.innerHTML=

`${mins}:${secs}`;



shotsOverlay.innerHTML=

`Shots: ${hits.length}`;



requestAnimationFrame(

syncPlayback

);

}



startBtn.onclick=()=>{

console.log("START BUTTON CLICKED");

playback.pause();

playback.src="";

preview.style.display="block";

playback.style.display="none";

beginCountdown();

};



stopBtn.onclick=()=>{

stopRecording();

};

</script>

</body>

</html>
