<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Rear Camera Video Recorder</title>

<style>

body{

margin:0;

font-family:Arial,sans-serif;

background:#111;

color:white;

text-align:center;

}

.container{

position:relative;

width:95%;

max-width:700px;

margin:20px auto;

}

video{

width:100%;

border-radius:12px;

background:black;

display:block;

}

canvas{

position:absolute;

top:0;

left:0;

pointer-events:none;

z-index:5;

}

#settingsBar{

margin-bottom:15px;

font-size:18px;

}

#distanceSelect{

font-size:18px;

padding:5px;

border-radius:6px;

}

#timerOverlay{

position:absolute;

top:15px;

left:50%;

transform:translateX(-50%);

background:rgba(0,0,0,.5);

padding:5px 14px;

border-radius:8px;

font-size:22px;

font-weight:bold;

color:white;

z-index:20;

pointer-events:none;

}



#shotsOverlay{

position:absolute;

bottom:15px;

left:15px;

background:rgba(0,0,0,.5);

padding:5px 12px;

border-radius:8px;

font-size:18px;

font-weight:bold;

color:white;

z-index:20;

pointer-events:none;

}




#startBtn{

background:#00a651;

color:white;

}



#stopBtn{

background:#d62828;

color:white;

}



#countdown{

font-size:72px;

font-weight:bold;

color:#ffcc00;

height:90px;

}



#recordTimer{

font-size:24px;

margin-top:10px;

}

</style>

</head>

<body>



<h2>Rear Camera Video Recorder</h2>



<div id="countdown"></div>

<div id="settingsBar">

<label>

Distance:

<select id="distanceSelect">

<option value="3">3 yards</option>

<option value="5">5 yards</option>

<option value="7" selected>7 yards</option>

<option value="10">10 yards</option>

<option value="15">15 yards</option>

<option value="25">25 yards</option>

</select>

</label>

</div>

<div class="container">



<video

id="preview"

autoplay

playsinline

muted>

</video>



<video

id="playback"

playsinline

style="display:none;">

</video>



<canvas id="overlay"></canvas>



<div id="timerOverlay">

00:00

</div>



<div id="shotsOverlay">

Shots: 0

</div>



</div>



<div id="recordTimer">

00:00

</div>



<button id="startBtn">

Start Recording

</button>



<button id="stopBtn" disabled>

Stop Recording

</button>



<script>



const preview=document.getElementById("preview");

const playback=document.getElementById("playback");

const canvas=document.getElementById("overlay");

const ctx=canvas.getContext("2d");


const distanceSelect=document.getElementById("distanceSelect");
  
const timerOverlay=document.getElementById("timerOverlay");

const shotsOverlay=document.getElementById("shotsOverlay");



const countdown=document.getElementById("countdown");

const recordTimer=document.getElementById("recordTimer");



const startBtn=document.getElementById("startBtn");

const stopBtn=document.getElementById("stopBtn");



let stream;

let mediaRecorder;

let recordedChunks=[];



let recordingSeconds=0;

let timerInterval;



let shots=0;



// OPEN CAMERA



async function startCamera(){



try{



stream=await navigator.mediaDevices.getUserMedia({



video:{



facingMode:{ideal:"environment"},



width:{ideal:1280},



height:{ideal:720}



},



audio:true



});



preview.srcObject=stream;



}catch(err){



alert("Unable to access camera.");



console.log(err);



}



}



startCamera();





// COUNTDOWN



function beginCountdown(){



let count=3;



countdown.innerHTML=count;



const interval=setInterval(()=>{



count--;



if(count>0){



countdown.innerHTML=count;



}else{



clearInterval(interval);



countdown.innerHTML="";



startRecording();



}



},1000);



}





// START RECORDING



function startRecording(){



recordedChunks=[];



recordingSeconds=0;



shots=0;



mediaRecorder=new MediaRecorder(stream);



mediaRecorder.ondataavailable=e=>{



if(e.data.size>0){



recordedChunks.push(e.data);



}



};



mediaRecorder.onstop=showPlayback;



mediaRecorder.start();



timerInterval=setInterval(()=>{



recordingSeconds++;



updateDisplays();



},1000);



startBtn.disabled=true;



stopBtn.disabled=false;



}





// STOP RECORDING



function stopRecording(){



mediaRecorder.stop();



clearInterval(timerInterval);



startBtn.disabled=false;



stopBtn.disabled=true;



}





// UPDATE OVERLAYS



function updateDisplays(){



let mins=Math.floor(recordingSeconds/60)

.toString()

.padStart(2,"0");



let secs=(recordingSeconds%60)

.toString()

.padStart(2,"0");



let time=`${mins}:${secs}`;



timerOverlay.innerHTML=time;



recordTimer.innerHTML=time;



// SAMPLE DATA

// Replace with laser detection later



shots=Math.floor(recordingSeconds/2);



shotsOverlay.innerHTML=`Shots: ${shots}`;

  

}





// PLAYBACK



function showPlayback(){



const blob=new Blob(



recordedChunks,



{type:"video/webm"}



);



const url=URL.createObjectURL(blob);



preview.style.display="none";



playback.style.display="block";



playback.src=url;



playback.onloadedmetadata=()=>{



resizeCanvas();



playback.play();



requestAnimationFrame(syncPlayback);



};



}





// PLAYBACK TIMER



function syncPlayback(){



if(playback.paused || playback.ended){



return;



}



let t=Math.floor(playback.currentTime);



let mins=Math.floor(t/60)

.toString()

.padStart(2,"0");



let secs=(t%60)

.toString()

.padStart(2,"0");



timerOverlay.innerHTML=`${mins}:${secs}`;



shotsOverlay.innerHTML=`Shots: ${Math.floor(t/2)}`;



ctx.clearRect(



0,



0,



canvas.width,



canvas.height



);



// draw shot markers here later



requestAnimationFrame(syncPlayback);



}





// CANVAS SIZE



function resizeCanvas(){



const rect=playback.getBoundingClientRect();



canvas.width=rect.width;



canvas.height=rect.height;



canvas.style.width=rect.width+"px";



canvas.style.height=rect.height+"px";



}



window.addEventListener(



"resize",



resizeCanvas



);





// BUTTONS



startBtn.onclick=()=>{



preview.style.display="block";



playback.style.display="none";



beginCountdown();



};



stopBtn.onclick=()=>{



stopRecording();



};



</script>



</body>

</html>
