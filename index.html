<!DOCTYPE html>

<html>

<head>

<meta name="viewport"
content="width=device-width,
initial-scale=1">

<style>

body{

margin:0;

background:black;

overflow:hidden;

}

video{

position:absolute;

top:0;

left:0;

width:100vw;

height:100vh;

object-fit:cover;

}

#timer{

position:absolute;

top:20px;

left:50%;

transform:translateX(-50%);

font-size:60px;

font-weight:bold;

color:white;

z-index:2;

}

#countdown{

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

font-size:120px;

color:red;

z-index:2;

}

#record{

position:absolute;

bottom:100px;

left:50%;

transform:translateX(-50%);

padding:20px;

font-size:30px;

border-radius:50px;

z-index:2;

}

#stop{

position:absolute;

bottom:20px;

left:50%;

transform:translateX(-50%);

padding:20px;

font-size:30px;

border-radius:50px;

z-index:2;

}

</style>

</head>

<body>

<div id="timer">

00:00

</div>

<div id="countdown"></div>

<video
id="preview"
autoplay
playsinline
muted>

</video>

<button id="record">

● RECORD

</button>

<button id="stop">

STOP

</button>

<script>

let stream;

let recorder;

let chunks=[];

let seconds=0;

let timer;

navigator.mediaDevices

.getUserMedia({

video:true,

audio:true

})

.then(s=>{

stream=s;

preview.srcObject=s;

});

function startCountdown(){

let c=3;

countdown.innerHTML=c;

let i=setInterval(()=>{

c--;

if(c>0){

countdown.innerHTML=c;

}

else if(c==0){

countdown.innerHTML="GO";

}

else{

countdown.innerHTML="";

clearInterval(i);

startRecording();

}

},1000);

}

record.onclick=()=>{

startCountdown();

}

function startRecording(){

chunks=[];

seconds=0;

timer=setInterval(()=>{

seconds++;

let m=Math.floor(seconds/60);

let s=seconds%60;

timerDisplay();

},1000);

recorder=

new MediaRecorder(stream);

recorder.ondataavailable=

e=>chunks.push(e.data);

recorder.ondataavailable =
e => chunks.push(e.data);

recorder.onstop = () => {

const blob = new Blob(chunks, {

type: 'video/webm'

});

const url = URL.createObjectURL(blob);

window.open(url);

};

recorder.start();

}

function timerDisplay(){

let m=

String(Math.floor(seconds/60))

.padStart(2,"0");

let s=

String(seconds%60)

.padStart(2,"0");

timer.innerHTML=

m+":"+s;

}

stop.onclick=()=>{

recorder.stop();

clearInterval(timer);

}

recorder?.onstop=()=>{

const blob=

new Blob(chunks,{

type:"video/mp4"

});

let url=

URL.createObjectURL(blob);

window.open(url);

}

</script>

</body>

</html>
