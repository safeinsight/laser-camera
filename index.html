<html>

<head>

<meta charset="UTF-8">

<meta

Laser Target Trainer

<style>

bold;

</head>

<body>



<h2>

Laser Target Trainer

</h2>



<div id="countdown">

</div>



<button

id="calibrateBtn">

Calibrate Target

</button>



<div class="container">

<video

id="preview"

autoplay

playsinline

muted>

</video>



<video

id="playback"

playsinline

style="display:none;">

</video>



<canvas

id="overlay">

</canvas>



<canvas

id="detectCanvas">

</canvas>



<div

id="greenBox">

</div>



<div

id="timerOverlay">

00:00

</div>



<div

id="shotsOverlay">

Shots: 0

</div>



<div

Distance: 7y

</div>



<div

id="distancePopup">



<div

class="distanceOption">

3

</div>



<div

class="distanceOption">

5

</div>



<div

class="distanceOption selected">

7

</div>



<div

class="distanceOption">

10

</div>



<div

class="distanceOption">

15

</div>



<div

class="distanceOption">

25

</div>



</div>

<button

id="startBtn">

Start Recording

</button>



<button

id="stopBtn"

Stop Recording

</button>



<script>



const preview=

document.getElementById(

"preview"

);



const playback=

document.getElementById(

"playback"

);



const overlay=

document.getElementById(

"overlay"

);



const ctx=

overlay.getContext(

"2d"

);



const detectCanvas=

document.getElementById(

"detectCanvas"

);



const detectCtx=

detectCanvas.getContext(

"2d",

{

willReadFrequently:true

}

);



const greenBox=

document.getElementById(

"greenBox"

);



const timerOverlay=

document.getElementById(

"timerOverlay"

);



const shotsOverlay=

document.getElementById(

"shotsOverlay"

);



const distanceOverlay=

document.getElementById(

"distanceOverlay"

);



const distancePopup=

document.getElementById(

"distancePopup"

);



const distanceOptions=

document.querySelectorAll(

".distanceOption"

);



const calibrateBtn=

document.getElementById(

"calibrateBtn"

);



const startBtn=

document.getElementById(

"startBtn"

);



const stopBtn=

document.getElementById(

"stopBtn"

);



const countdown=

document.getElementById(

"countdown"

);

//--------------------------
// VARIABLES (VERSION 4)
//--------------------------

let stream = null;
let mediaRecorder = null;
let recordedChunks = [];

let recordingSeconds = 0;
let timerInterval = null;

let targetDistance = 7;

let shots = 0;
let hits = [];

//-------------------------------------
// LASER STATE
//-------------------------------------

// TRUE while a laser blob is visible.
// Prevents repeated shots while the
// laser is held on the target.

let laserVisible = false;

// Minimum time between shots
// (extra safety)

let lastShotTime = 0;

//-------------------------------------
// NORMALIZED TARGET
//-------------------------------------

// IMPORTANT:
//
// These values are stored from
// 0.0 to 1.0 instead of pixels.
//
// They never depend on camera
// resolution or browser size.
//
// Example:
//
// left = 0.22
//
// means:
//
// 22% across the image.
//

let target = {

    left:0,

    right:0,

    top:0,

    bottom:0,

    calibrated:false

};

// Used only during calibration

let calibrationStep = 0;

//-------------------------------------
// CURRENT CAMERA SIZE
//-------------------------------------

// Updated every resize()

let cameraWidth = 0;
let cameraHeight = 0;

//-------------------------------------
// DISPLAY SIZE
//-------------------------------------

// Size of displayed video element

let displayWidth = 0;
let displayHeight = 0;

//-------------------------------------
// OVERLAY SCALE
//-------------------------------------

// Converts camera coordinates
// to overlay coordinates.

let scaleX = 1;
let scaleY = 1;

//-------------------------------------
// DETECTOR SETTINGS
//-------------------------------------

const DETECTOR = {

    pixelStep:2,

    redThreshold:150,

    whiteThreshold:235,

    minBlobPixels:4,

    shotDelay:250

};


//--------------------------
// CAMERA
//--------------------------

async function startCamera(){



try{



stream=

await navigator.mediaDevices

.getUserMedia({



video:{



facingMode:{

ideal:"environment"

},



width:{

ideal:1280

},



height:{

ideal:720

}



},



audio:true



});



preview.srcObject=

stream;



preview.onloadedmetadata=()=>{



resizeEverything();



};





}catch(err){



alert(

"Unable to access camera"

);



console.log(err);



}



}



startCamera();

preview.addEventListener(

"click",

handleCalibrationTap

);


//------------------------------------------------
// RESIZE EVERYTHING (VERSION 4)
//------------------------------------------------

function resizeEverything(){

    const video =
        preview.style.display != "none"
            ? preview
            : playback;

    if(
        !video.videoWidth ||
        !video.videoHeight
    ){
        return;
    }

    //----------------------------------------
    // Store camera size
    //----------------------------------------

    cameraWidth = video.videoWidth;
    cameraHeight = video.videoHeight;

    //----------------------------------------
    // Store displayed size
    //----------------------------------------

    const rect =
        video.getBoundingClientRect();

    displayWidth = rect.width;
    displayHeight = rect.height;

    //----------------------------------------
    // Overlay matches camera pixels
    //----------------------------------------

    overlay.width = cameraWidth;
    overlay.height = cameraHeight;

    //----------------------------------------
    // Conversion factors
    //----------------------------------------

    scaleX =
        overlay.width /
        cameraWidth;

    scaleY =
        overlay.height /
        cameraHeight;

    console.log(
        "Overlay:",
        overlay.width,
        overlay.height
    );

    drawGreenBox();

    drawHits();

}




//--------------------------
// COUNTDOWN
//--------------------------

function beginCountdown(){

    console.log("COUNTDOWN STARTED");

    let count=3;

    countdown.innerHTML=count;

    const interval=setInterval(()=>{

        console.log("COUNT:", count);

        count--;

        if(count>0){

            countdown.innerHTML=count;

        } else {

            clearInterval(interval);

            console.log("CALLING startRecording");

            countdown.innerHTML="";

            startRecording();

        }

    },1000);
}



//--------------------------
// START RECORDING
//--------------------------

function startRecording(){



recordedChunks=[];



hits=[];



shots=0;



recordingSeconds=0;





updateDisplays();





mediaRecorder=



new MediaRecorder(

stream

);





mediaRecorder

.ondataavailable=(e)=>{



if(

e.data.size>0

){



recordedChunks.push(

e.data

);



}



};





mediaRecorder

.onstop=



showPlayback;





mediaRecorder.start();

console.log("BEFORE requestAnimationFrame");

requestAnimationFrame(
    detectLaser
);

console.log("AFTER requestAnimationFrame");



timerInterval=



setInterval(()=>{


recordingSeconds++;


updateDisplays();



},1000);


    
startBtn.disabled=true;



stopBtn.disabled=false;



}




//--------------------------
// STOP RECORDING
//--------------------------

function stopRecording(){



mediaRecorder.stop();





clearInterval(

timerInterval

);





startBtn.disabled=false;



stopBtn.disabled=true;



}




//--------------------------
// PLAYBACK
//--------------------------

function showPlayback(){



const blob=



new Blob(



recordedChunks,



{

type:"video/webm"

}



);





const url=



URL.createObjectURL(

blob

);





preview.style.display=



"none";





playback.style.display=



"block";





playback.src=url;





playback.onloadedmetadata=()=>{



resizeEverything();





playback.play();





requestAnimationFrame(

syncPlayback

);



};



}


//--------------------------
// UPDATE DISPLAYS
//--------------------------

function updateDisplays(){

let mins=

Math.floor(

recordingSeconds/60

)

.toString()

.padStart(2,"0");



let secs=

(recordingSeconds%60)

.toString()

.padStart(2,"0");



let time=

`${mins}:${secs}`;



timerOverlay.innerHTML=

time;



shotsOverlay.innerHTML=

`Shots: ${shots}`;



distanceOverlay.innerHTML=

`Distance: ${targetDistance}y`;

}



//------------------------------------------------
// CALIBRATE TARGET (VERSION 4)
//------------------------------------------------

function calibrateTarget(){

    alert(
        "Tap the TOP LEFT corner of your target."
    );

    calibrationStep = 1;

}


function handleCalibrationTap(e){

    if(calibrationStep===0){
        return;
    }

    //--------------------------------------
    // Get displayed video size
    //--------------------------------------

    const rect = preview.getBoundingClientRect();

    //--------------------------------------
    // NORMALIZED coordinates (0-1)
    //--------------------------------------

    const nx =
        (e.clientX - rect.left) /
        rect.width;

    const ny =
        (e.clientY - rect.top) /
        rect.height;

    //--------------------------------------
    // FIRST TAP
    //--------------------------------------

    if(calibrationStep===1){

        target.left = nx;
        target.top = ny;

        calibrationStep = 2;

        alert(
            "Now tap the BOTTOM RIGHT corner."
        );

        return;

    }

    //--------------------------------------
    // SECOND TAP
    //--------------------------------------

    target.right = nx;
    target.bottom = ny;

    //--------------------------------------
    // Ensure correct ordering
    //--------------------------------------

    if(target.left > target.right){

        let t = target.left;
        target.left = target.right;
        target.right = t;

    }

    if(target.top > target.bottom){

        let t = target.top;
        target.top = target.bottom;
        target.bottom = t;

    }

    target.calibrated = true;

    calibrationStep = 0;

    drawGreenBox();

    drawHits();

    console.log(
        "Normalized Target:",
        target
    );

    alert(
        "Target Calibrated"
    );

}

//------------------------------------------------
// TARGET PIXELS
//------------------------------------------------

function getTargetPixels(){

    return{

        left:
            target.left *
            detectCanvas.width,

        right:
            target.right *
            detectCanvas.width,

        top:
            target.top *
            detectCanvas.height,

        bottom:
            target.bottom *
            detectCanvas.height

    };

}

//------------------------------------------------
// DRAW GREEN BOX (VERSION 4)
//------------------------------------------------

function drawGreenBox(){

    if(!target.calibrated){
        return;
    }

    const p =
        getTargetPixels();

    ctx.save();

    ctx.strokeStyle = "#00FF00";

    ctx.lineWidth = 4;

    ctx.strokeRect(

        p.left,

        p.top,

        p.right - p.left,

        p.bottom - p.top

    );

    ctx.restore();

}

    //------------------------------------------------
// CLEAR OVERLAY
//------------------------------------------------

function clearOverlay(){

    ctx.clearRect(
        0,
        0,
        overlay.width,
        overlay.height
    );

    if(target.calibrated){
        drawGreenBox();
    }

}

//--------------------------
// DISTANCE POPUP
//--------------------------

distanceOverlay.onclick=(e)=>{



e.stopPropagation();



if(

distancePopup.style.display

=="block"

){

distancePopup.style.display=

"none";

}



else{



distancePopup.style.display=

"block";



}



};



distanceOptions.forEach(option=>{



option.onclick=(e)=>{



e.stopPropagation();



targetDistance=

parseInt(

option.innerText

);



distanceOptions

.forEach(o=>{



o.classList.remove(

"selected"

);



});



option.classList.add(

"selected"

);



distanceOverlay.innerHTML=

`Distance: ${targetDistance}y`;



distancePopup.style.display=

"none";



};



});



document.onclick=()=>{



distancePopup.style.display=

"none";



};


//------------------------------------------------
// LASER DETECTION V3
//------------------------------------------------

function detectLaser(){

    if(
        !mediaRecorder ||
        mediaRecorder.state !== "recording"
    ){
        return;
    }

    if(!target.calibrated){
        requestAnimationFrame(detectLaser);
        return;
    }

    detectCtx.drawImage(
        preview,
        0,
        0,
        detectCanvas.width,
        detectCanvas.height
    );

    const frame = detectCtx.getImageData(
        0,
        0,
        detectCanvas.width,
        detectCanvas.height
    );

    const pixels = frame.data;

    const left   = Math.max(0,Math.floor(Math.min(target.left,target.right)));
    const right  = Math.min(detectCanvas.width,Math.floor(Math.max(target.left,target.right)));
    const top    = Math.max(0,Math.floor(Math.min(target.top,target.bottom)));
    const bottom = Math.min(detectCanvas.height,Math.floor(Math.max(target.top,target.bottom)));

    let totalX = 0;
    let totalY = 0;
    let totalWeight = 0;
    let brightPixels = 0;

    for(let y=top;y<bottom;y+=2){

        for(let x=left;x<right;x+=2){

            const i=((y*detectCanvas.width)+x)*4;

            const r=pixels[i];
            const g=pixels[i+1];
            const b=pixels[i+2];

            const brightness=(r+g+b)/3;

            const laser =

                (
                    r>150 &&
                    r>g*1.15 &&
                    r>b*1.15
                )

                ||

                (
                    brightness>235
                );

            if(!laser) continue;

            brightPixels++;

            const weight=Math.max(r,brightness);

            totalWeight+=weight;
            totalX+=x*weight;
            totalY+=y*weight;

        }

    }

    if(brightPixels<4){

        requestAnimationFrame(detectLaser);
        return;

    }

    const hitX=Math.round(totalX/totalWeight);
    const hitY=Math.round(totalY/totalWeight);

    const overlayX=
        hitX/detectCanvas.width*overlay.width;

    const overlayY=
        hitY/detectCanvas.height*overlay.height;

    drawHits();

    ctx.beginPath();
    ctx.arc(
        overlayX,
        overlayY,
        8,
        0,
        Math.PI*2
    );

    ctx.lineWidth=3;
    ctx.strokeStyle="red";
    ctx.stroke();

    const now=performance.now();

    if(now-lastShotTime>250){

        lastShotTime=now;

        shots++;

        hits.push({

            x:hitX,
            y:hitY,
            time:recordingSeconds

        });

        updateDisplays();

        console.log(
            "SHOT",
            shots,
            hitX,
            hitY
        );

    }

    requestAnimationFrame(
        detectLaser
    );

}




//--------------------------
// DRAW HITS
//--------------------------

function drawHits(){



ctx.clearRect(

0,

0,

overlay.width,

overlay.height

);



ctx.strokeStyle=

"yellow";



ctx.lineWidth=4;



hits.forEach(hit=>{



const x=

(hit.x/

preview.videoWidth)

*

ctx.canvas.width;



const y=

(hit.y/

preview.videoHeight)

*

ctx.canvas.height;



ctx.beginPath();



ctx.arc(



x,



y,



16,



0,



Math.PI*2



);



ctx.stroke();



});



}

calibrateBtn.onclick=()=>{

calibrateTarget();

};



function syncPlayback(){

if(

playback.paused ||

playback.ended

){

return;

}



ctx.clearRect(

0,

0,

overlay.width,

overlay.height

);



ctx.strokeStyle="yellow";

ctx.lineWidth=4;



hits.forEach(hit=>{



if(

hit.time<=

playback.currentTime

){



const x=

(hit.x/

preview.videoWidth)

*

overlay.width;



const y=

(hit.y/

preview.videoHeight)

*

overlay.height;



ctx.beginPath();



ctx.arc(

x,

y,

16,

0,

Math.PI*2

);



ctx.stroke();



}



});



let t=

Math.floor(

playback.currentTime

);



let mins=

Math.floor(

t/60

)

.toString()

.padStart(

2,

"0"

);



let secs=

(t%60)

.toString()

.padStart(

2,

"0"

);



timerOverlay.innerHTML=

`${mins}:${secs}`;



shotsOverlay.innerHTML=

`Shots: ${hits.length}`;



requestAnimationFrame(

syncPlayback

);

}



startBtn.onclick=()=>{

console.log("START BUTTON CLICKED");

playback.pause();

playback.src="";

preview.style.display="block";

playback.style.display="none";

beginCountdown();

};



stopBtn.onclick=()=>{

stopRecording();

};

</script>

</body>

</html>
